<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Freedom OS">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Personal operating system for solo entrepreneurs">

  <title>Freedom OS</title>

  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <link rel="stylesheet" href="css/charts.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/jarvis.css">

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%2300d4aa' width='180' height='180' rx='40'/%3E%3Ctext x='90' y='115' font-family='Arial' font-size='90' font-weight='bold' text-anchor='middle' fill='%230a0a0f'%3EF%3C/text%3E%3C/svg%3E">
  <base target="_blank">
<base target="_blank">
</head>
<body>
  <div id="app">
    <div class="ambient-glow"></div>
    <div class="brand-grid-bg"></div>

    <header id="mobile-header" class="mobile-header">
      <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="mobile-brand">
        <span class="mobile-brand-mark">&#9672;</span>
        <span class="mobile-brand-text">Freedom OS</span>
      </div>
      <button id="mobile-capture-btn" class="mobile-capture-btn" aria-label="Quick capture">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </header>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">&#9672;</div>
          <div class="brand-text">Freedom OS</div>
        </div>
        <button id="sidebar-close" class="sidebar-close" aria-label="Close sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div id="timer-widget" class="timer-widget hidden">
          <div class="timer-display">00:00:00</div>
          <button class="timer-stop" aria-label="Stop timer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </button>
        </div>
        <div class="sidebar-meta">
          <span class="version">v2.0.1</span>
          <span class="target-date">Target: Apr 20, 2029</span>
        </div>
      </div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <main id="main" class="main-content">
      <header id="header" class="header"></header>
      <div id="content" class="content-area"></div>
    </main>

    <nav id="mobile-nav" class="mobile-nav">
      <button class="mobile-nav-item active" data-route="dashboard" aria-label="Dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Home</span>
      </button>
      <button class="mobile-nav-item" data-route="projects" aria-label="Projects">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>Projects</span>
      </button>
      <button class="mobile-nav-item mobile-nav-fab" data-route="importExport" aria-label="Backup">
        <div class="fab-bg">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </div>
      </button>
      <button class="mobile-nav-item" data-route="finance" aria-label="Finance">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
        <span>Money</span>
      </button>
      <button class="mobile-nav-item" data-route="stageMode" aria-label="Stage Mode">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <span>Stage</span>
      </button>
    </nav>

    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <div id="toast-container" class="toast-container"></div>
    <div id="search-overlay" class="search-overlay hidden"></div>
    <div id="sos-overlay" class="sos-overlay hidden"></div>
    <div id="shortcut-overlay" class="shortcut-overlay hidden"></div>
    <div id="capture-overlay" class="capture-overlay hidden"></div>
    <div id="onboarding-overlay" class="onboarding-overlay hidden"></div>

    <div id="bottom-sheet-overlay" class="bottom-sheet-overlay hidden">
      <div class="bottom-sheet-backdrop"></div>
      <div class="bottom-sheet" id="bottom-sheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-content" id="bottom-sheet-content"></div>
      </div>
    </div>

    <div id="offline-indicator" class="offline-indicator hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
      <span>Offline &mdash; Working locally</span>
    </div>

    <div id="save-indicator" class="save-indicator hidden">
      <span class="save-dot"></span>
      <span class="save-text">Saved</span>
    </div>
  </div>

  <!-- ============================================================
       KERNEL (load first — provides FreedomOS global)

  <script src="js/kernel/utils.js"></script>
  <script src="js/kernel/events.js"></script>

  <script src="js/kernel/core.js"></script>

  <script src="js/modules/warRoom.js"></script>

  <script src="js/modules/stageMode.js"></script>

  <script src="js/modules/people.js"></script>
  <script src="js/modules/wins.js"></script>
  <script src="js/modules/letters.js"></script>
  <script src="js/modules/reviews.js"></script>
  <script src="js/modules/roadmap.js"></script>
  <script src="js/modules/stats.js"></script>
  <script src="js/modules/analytics.js"></script>
  <script src="js/modules/jarvis-v3.js"></script>

  <!-- ============================================================
       SYSTEM TOOLS (overlays, search, shortcuts, etc.)
       ============================================================ -->
  <script src="js/system/search.js"></script>
  <script src="js/system/shortcuts.js"></script>
  <script src="js/system/sos.js"></script>
  <script src="js/system/capture.js"></script>
  <script src="js/system/onboarding.js"></script>
  <script src="js/system/importExport.js"></script>
  <script src="js/system/mobile.js"></script>

  <!-- ============================================================
       BOOT
       ============================================================ -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Defensive boot with detailed error reporting
      try {
        if (typeof FreedomOS === 'undefined') {
          throw new Error('FreedomOS kernel failed to load. Check that js/kernel/utils.js, events.js, ui.js, core.js are present and loaded in order.');
        }
        if (typeof FreedomOS.init !== 'function') {
          throw new Error('FreedomOS.init is not a function. The kernel may have failed to initialize properly.');
        }
        FreedomOS.init();
        console.log('[FreedomOS] Boot successful. Version:', FreedomOS.state && FreedomOS.state.version);
      } catch (err) {
        console.error('[FreedomOS] BOOT ERROR:', err);
        document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444;font-family:sans-serif;"><h1>Kernel Error</h1><p>' + err.message + '</p><p style="color:#888;font-size:12px;margin-top:20px;">Check browser console for details.</p></div>';
      }
    });
  </script>
</body>
</html>
