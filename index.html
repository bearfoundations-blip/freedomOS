<style>
/* ═══════════════════════════════════════════
   JARVIS EMBEDDED — FREEDOM OS THEME
   ═══════════════════════════════════════════ */
#jarvis-embed {
  position: fixed;
  z-index: 9999;
  bottom: 0;
  right: 0;
  pointer-events: none;
  font-family: 'Inter', system-ui, sans-serif;
}

#jarvis-embed * {
  pointer-events: auto;
}

/* Trigger Button */
#jarvis-trigger {
  position: fixed;
  bottom: calc(var(--mobile-nav-height, 0px) + 20px);
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2px solid var(--color-primary);
  background: linear-gradient(145deg, var(--color-surface) 0%, rgba(26, 26, 37, 0.9) 100%);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 20px rgba(0, 212, 170, 0.2), 0 4px 12px rgba(0, 0, 0, 0.4);
  z-index: 9999;
}

#jarvis-trigger:hover {
  transform: scale(1.1) translateY(-2px);
  box-shadow: 0 0 30px rgba(0, 212, 170, 0.35), 0 8px 24px rgba(0, 0, 0, 0.5);
}

#jarvis-trigger:active {
  transform: scale(0.95);
}

.jarvis-trigger-icon {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 20px;
  color: var(--color-primary);
  text-shadow: 0 0 10px rgba(0, 212, 170, 0.4);
}

.jarvis-trigger-ping {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--color-primary);
  opacity: 0;
  animation: jarvisPing 2s ease-out infinite;
}

@keyframes jarvisPing {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* Panel */
.jarvis-panel {
  position: fixed;
  bottom: calc(var(--mobile-nav-height, 0px) + 88px);
  right: 20px;
  width: 380px;
  max-width: calc(100vw - 40px);
  height: 520px;
  max-height: calc(100vh - 120px);
  background: linear-gradient(145deg, var(--color-surface) 0%, rgba(15, 15, 26, 0.95) 100%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px) scale(0.96);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 212, 170, 0.1);
  pointer-events: none;
  visibility: hidden;
}

.jarvis-panel.active {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
  visibility: visible;
}

/* Panel Top Border Glow */
.jarvis-panel::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-primary-glow), transparent);
  z-index: 2;
}

/* Header */
.jarvis-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}

.jarvis-panel-brand {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.jarvis-brand-icon {
  width: 28px;
  height: 28px;
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 12px;
  color: var(--color-primary);
  text-shadow: 0 0 8px rgba(0, 212, 170, 0.3);
}

.jarvis-brand-text {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.jarvis-panel-actions {
  display: flex;
  gap: var(--space-xs);
}

.jarvis-btn-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  background: var(--color-surface-elevated);
  color: var(--color-text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all var(--transition-fast);
}

.jarvis-btn-icon:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: rgba(0, 212, 170, 0.08);
}

/* Body */
.jarvis-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-md);
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.jarvis-messages {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.jarvis-bubble {
  max-width: 90%;
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-lg);
  font-size: 13px;
  line-height: 1.6;
  animation: jarvisBubbleIn 0.3s ease-out;
}

@keyframes jarvisBubbleIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.jarvis-bubble-user {
  align-self: flex-end;
  background: rgba(0, 212, 170, 0.08);
  border: 1px solid rgba(0, 212, 170, 0.2);
  color: var(--color-text);
  border-bottom-right-radius: var(--radius-sm);
}

.jarvis-bubble-ai {
  align-self: flex-start;
  background: rgba(124, 58, 237, 0.08);
  border: 1px solid rgba(124, 58, 237, 0.2);
  color: var(--color-text);
  border-bottom-left-radius: var(--radius-sm);
}

.jarvis-bubble-ai::before {
  content: 'JARVIS';
  display: block;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--color-accent);
  margin-bottom: 2px;
}

.jarvis-bubble-system {
  align-self: center;
  background: rgba(255, 255, 255, 0.03);
  border: 1px dashed rgba(255, 255, 255, 0.08);
  color: var(--color-text-muted);
  font-size: 12px;
  font-style: italic;
  max-width: 95%;
}

/* Typing */
.jarvis-typing {
  display: flex;
  gap: 4px;
  padding: var(--space-sm) var(--space-md);
  align-self: flex-start;
}

.jarvis-typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
  animation: jarvisTyping 1.4s ease-in-out infinite;
}

.jarvis-typing-dot:nth-child(2) { animation-delay: 0.2s; }
.jarvis-typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes jarvisTyping {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* Footer */
.jarvis-panel-footer {
  padding: var(--space-md) var(--space-lg);
  border-top: 1px solid var(--color-border);
  flex-shrink: 0;
}

.jarvis-input-wrap {
  display: flex;
  gap: var(--space-sm);
  align-items: center;
  margin-bottom: var(--space-sm);
}

#jarvis-input {
  flex: 1;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-sm) var(--space-md);
  color: var(--color-text);
  font-size: 13px;
  font-family: 'Inter', system-ui, sans-serif;
  outline: none;
  transition: all var(--transition-base);
}

#jarvis-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-glow);
}

#jarvis-input::placeholder {
  color: var(--color-text-muted);
  opacity: 0.6;
}

.jarvis-send-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-primary);
  background: rgba(0, 212, 170, 0.1);
  color: var(--color-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-base);
  flex-shrink: 0;
}

.jarvis-send-btn:hover {
  background: rgba(0, 212, 170, 0.2);
  box-shadow: 0 0 15px rgba(0, 212, 170, 0.2);
  transform: scale(1.05);
}

.jarvis-send-btn:active {
  transform: scale(0.95);
}

/* Status */
.jarvis-status {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  font-size: 11px;
  color: var(--color-text-muted);
}

.jarvis-status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--color-success);
  box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
  animation: jarvisStatusBlink 2s infinite;
}

.jarvis-status-dot.offline {
  background: var(--color-danger);
  box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
}

@keyframes jarvisStatusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Scrollbar */
.jarvis-panel-body::-webkit-scrollbar { width: 4px; }
.jarvis-panel-body::-webkit-scrollbar-track { background: transparent; }
.jarvis-panel-body::-webkit-scrollbar-thumb { background: rgba(0, 212, 170, 0.15); border-radius: 2px; }

/* Mobile Adjustments */
@media (max-width: 768px) {
  .jarvis-panel {
    width: calc(100vw - 32px);
    height: 60vh;
    bottom: calc(var(--mobile-nav-height, 72px) + 80px);
    right: 16px;
    left: 16px;
  }
  
  #jarvis-trigger {
    bottom: calc(var(--mobile-nav-height, 72px) + 16px);
    right: 16px;
  }
}

/* Hide trigger when panel is open */
.jarvis-panel.active ~ #jarvis-trigger {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.8);
}
</style>

<script>
(function() {
  'use strict';

  // DOM refs
  const embed = document.getElementById('jarvis-embed');
  const trigger = document.getElementById('jarvis-trigger');
  const panel = document.getElementById('jarvis-panel');
  const closeBtn = document.getElementById('jarvis-close');
  const expandBtn = document.getElementById('jarvis-expand');
  const input = document.getElementById('jarvis-input');
  const sendBtn = document.getElementById('jarvis-send');
  const messages = document.getElementById('jarvis-messages');
  const typing = document.getElementById('jarvis-typing');
  const statusDot = document.getElementById('jarvis-status-dot');
  const statusText = document.getElementById('jarvis-status-text');

  let isOpen = false;
  let isProcessing = false;

  // Show embed (hidden by default to avoid FOUC)
  embed.style.display = 'block';

  // Check AI health
  async function checkHealth() {
    try {
      const res = await fetch('/api/health');
      const data = await res.json();
      if (data.status === 'ok') {
        statusDot.classList.remove('offline');
        statusText.textContent = data.provider === 'mock' ? 'Mock Mode' : 'AI Online';
      }
    } catch (e) {
      statusDot.classList.add('offline');
      statusText.textContent = 'Server Offline';
    }
  }

  function togglePanel() {
    isOpen = !isOpen;
    panel.classList.toggle('active', isOpen);
    if (isOpen) {
      input.focus();
      checkHealth();
    }
  }

  function addBubble(text, sender) {
    const bubble = document.createElement('div');
    bubble.className = `jarvis-bubble jarvis-bubble-${sender}`;
    if (sender === 'system') {
      bubble.textContent = text;
    } else {
      bubble.innerHTML = text.replace(/\n/g, '<br>');
    }
    messages.appendChild(bubble);
    messages.scrollTop = messages.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isProcessing) return;

    input.value = '';
    addBubble(text, 'user');
    isProcessing = true;
    typing.style.display = 'flex';

    try {
      const res = await fetch('/api/jarvis', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          currentFile: null,
          manifestVersion: null
        })
      });

      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();

      typing.style.display = 'none';

      if (data.message) {
        addBubble(data.message, 'ai');
      }

      // Handle actions
      if (data.actions && data.actions.length > 0) {
        data.actions.forEach(action => {
          if (action.type === 'show_file') {
            addBubble(`📂 Opened ${action.path} in full JARVIS`, 'system');
          }
        });
      }

    } catch (e) {
      typing.style.display = 'none';
      addBubble(`⚠ Error: ${e.message}. Make sure server is running.`, 'system');
    } finally {
      isProcessing = false;
    }
  }

  // Events
  trigger.addEventListener('click', togglePanel);
  closeBtn.addEventListener('click', togglePanel);
  expandBtn.addEventListener('click', () => {
    window.open('/jarvis.html', '_blank');
    togglePanel();
  });

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // Keyboard shortcut: Ctrl/Cmd + J
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'j') {
      e.preventDefault();
      togglePanel();
    }
  });

  // Welcome message
  setTimeout(() => {
    if (messages.children.length === 0) {
      addBubble('JARVIS embedded. Press Ctrl+J anytime. Ask me about your Freedom OS codebase, or click ↗ for the full code assistant.', 'ai');
    }
  }, 1000);

  checkHealth();
})();
</script>
</body>
</html>
